name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python test tools
        run: python -m pip install --upgrade pip maturin pytest matplotlib
      - name: Check Rust formatting
        run: cargo fmt --check
      - name: Run Rust tests
        run: cargo test
      - name: Build local Python wheel
        run: maturin build --features python --out dist
      - name: Install local Python wheel
        run: python -m pip install dist/*.whl
      - name: Run Python tests
        run: pytest tests/python
