name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check Rust formatting
        run: cargo fmt --check
      - name: Run Rust tests
        run: cargo test

  python:
    name: Python ${{ matrix.python-version }} wheel install on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python test tools
        run: python -m pip install --upgrade pip maturin pytest matplotlib
      - name: Build local Python wheel
        run: maturin build --features python --out dist
      - name: Install local Python wheel
        run: >
          python -m pip install --no-index --find-links dist
          --only-binary=:all:
          fhr-monitor-analyzer
      - name: Run Python tests
        run: pytest tests/python
